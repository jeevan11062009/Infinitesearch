<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfiniteSearch</title><style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.container {
    text-align: center;
    margin-top: 50px;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    background: #00c6ff;
    color: black;
    cursor: pointer;
    margin-left: 10px;
}

button:hover {
    background: #0072ff;
    color: white;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
}

footer {
    text-align: center;
    margin-top: 50px;
    padding: 10px;
    font-size: 14px;
    opacity: 0.7;
}
</style></head><body><header>🔍 InfiniteSearch</header><nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Login</a>
</nav><div class="container">
    <h2>Search Anything, Anytime</h2>
    <input type="text" placeholder="Type your search...">
    <button onclick="search()">Search</button>
</div><div class="card" id="result">
    <h3>Results will appear here...</h3>
</div><footer>
© 2026 InfiniteSearch | Built by You 🚀
</footer><script>
function search() {
    let query = document.querySelector("input").value;
    let result = document.getElementById("result");

    if(query === "") {
        result.innerHTML = "<h3>Please enter something!</h3>";
    } else {
        result.innerHTML = `<h3>Showing results for: ${query}</h3>
        <p>This is a demo search. Connect API for real results.</p>`;
    }
}
</script></body>
</html>
